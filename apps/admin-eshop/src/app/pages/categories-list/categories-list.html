<div class="admin-page">
  <p-card header="Categories" subheader="List of categories">
    <div class="grid">
      <p class="col-12">
        <p-toolbar>
                <ng-template #start>
                    <p-button icon="pi pi-plus" label="New" class="mr-2" text severity="secondary" />
                    <p-button icon="pi pi-print" class="mr-2" text severity="secondary" />
                </ng-template>
                <ng-template #center>
                    <p-iconfield iconPosition="left">
                        <p-inputicon class="pi pi-search" />
                        <input type="text" pInputText placeholder="Search" />
                    </p-iconfield>
                </ng-template>
          </p-toolbar>
      </p>
    </div>
    <div class="grid">
      <div class="col-12">
        <p-table [value]="categories" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template #header>
                    <tr>
                        <th>Id</th>
                        <th>Name</th>
                        <th>Icon</th>
                    </tr>
                </ng-template>
                <ng-template #body let-category>
                    <tr class="table-row" (click)="selectCategory(category)">
                        <td>{{ category.id }}</td>
                        <td>{{ category.name }}</td>
                        <td><span class="{{category.icon}}"></span></td>
                    </tr>
                </ng-template>
            </p-table>
      </div>
    </div>
  </p-card>
</div>
