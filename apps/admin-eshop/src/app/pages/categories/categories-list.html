<div class="admin-page">
  <p-toast/>
  <p-card header="Categories" subheader="List of categories">
    <div class="grid">
      <p class="col-12">
        <p-toolbar>
                <ng-template #start>
                    <p-button routerLink="form" icon="pi pi-plus" label="New" class="mr-2" text severity="primary" />
                    <p-button icon="pi pi-print" class="mr-2" text severity="secondary" />
                </ng-template>
                <ng-template #end>
                    <p-iconfield iconPosition="left">
                        <p-inputicon class="pi pi-search" />
                        <input type="text" pInputText placeholder="Search" />
                    </p-iconfield>
                </ng-template>
          </p-toolbar>
      </p>
    </div>
    <div class="grid">
      <p-confirmdialog />
      <div class="col-12">
        <p-table [value]="categories()" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template #header>
                    <tr>
                        <th>Id</th>
                        <th>Name</th>
                        <th>Icon</th>
                        <th colspan="2">Actions</th>
                    </tr>
                </ng-template>
                <ng-template #body let-category>
                    <tr class="table-row">
                        <td>{{ category._id }}</td>
                        <td>{{ category.name }}</td>
                        <td><span class="{{`pi pi-${category.icon}`}}"></span></td>
                        <td><button pButton severity="info" [routerLink]="['form', category._id]"><i class="pi pi-pencil" pButtonIcon></i></button></td>
                        <td><i class="pi pi-trash" style="color: rgb(213, 37, 37)" (click)="confirm2(category)"></i></td>
                      </tr>
                </ng-template>
            </p-table>
      </div>
    </div>
  </p-card>
</div>
