<div class="admin-page">
  <p-toast/>
  <p-card header="Products" subheader="List of products">
    <div class="grid">
      <p class="col-12">
        <p-toolbar>
                <ng-template #start>
                    <p-button routerLink="form" icon="pi pi-plus" label="New" class="mr-2" text severity="primary" />
                </ng-template>
                <ng-template #end>
                    <p-iconfield iconPosition="left">
                        <p-inputicon class="pi pi-search" />
                        <input type="text"
                          (input)="searchKey.set($event.target.value)"
                          pInputText
                          placeholder="Search" />
                    </p-iconfield>
                </ng-template>
          </p-toolbar>
      </p>
    </div>
    <div class="grid">
      <p-confirmdialog />
      <div class="col-12">
        <p-table [value]="products()" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template #header>
                    <tr>
                        <th>Id</th>
                        <th pSortableColumn="name">Name</th>
                        <th>Image</th>
                        <th pSortableColumn="price">Price</th>
                        <th pSortableColumn="countInStock">Stock</th>
                        <th>Category</th>
                        <th pSortableColumn="dateCreated">Created at</th>
                        <th colspan="2">Actions</th>
                    </tr>
                </ng-template>
                <ng-template #body let-product>
                    <tr class="table-row">
                        <td>{{ product._id }}</td>
                        <td>{{ product.name }}</td>
                        <td><img [src]="product.image" alt="product image" style="max-width: 70px; max-height: 100px;"/></td>
                        <td>{{ product.price | currency:'€' }}</td>
                        <td>{{ product.countInStock }}</td>
                        <td>{{ product.category?.name }}</td>
                        <td>{{ product.dateCreated | date:'dd-M-yyyy' }}</td>
                        <td><button pButton severity="info" [routerLink]="['form', product._id]"><i class="pi pi-pencil" pButtonIcon></i></button></td>
                        <td><i class="pi pi-trash" style="color: rgb(213, 37, 37)" (click)="confirm2(product)"></i></td>
                      </tr>
                </ng-template>
            </p-table>
      </div>
    </div>
  </p-card>
</div>
