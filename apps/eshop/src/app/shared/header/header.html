<header>
  <div class="grid">
    <div class="col-3">
      <div class="logo">
        <img src="logo.png" class="logo" alt="logo"/>
      </div>
    </div>
    <div class="col-4 search">
      <lib-search></lib-search>
    </div>
    <div class="col-4 navigation">
      <app-nav></app-nav>
    </div>
    <div class="col-1 tools flex justify-center ">
      <i class="pi pi-user"></i>
      <p-overlaybadge [value]="cartService.totalItems()" severity="danger" routerLink="/cart">
        <i class="pi pi-shopping-cart" routerLink="/cart"></i>
      </p-overlaybadge>
    </div>
  </div>
</header>
