<header>
  <div class="grid">
    <div class="col-3">
      <div class="logo">
        <img src="logo.png" class="logo" alt="logo"/>
      </div>
    </div>
    <div class="col-4 search">
      <lib-search></lib-search>
    </div>
    <div class="col-4 navigation">
      <app-nav></app-nav>
    </div>
    <div class="col-1 tools flex justify-center ">
      @if(userStore.isLogged()) {
        <i class="pi pi-user-plus" style="color: var(--p-red-800); font-weight: 700;" (click)="logout()"></i>
      } @else {
        <i class="pi pi-user"></i>
      }

      @if(totalItems() > 0) {
        <p-overlaybadge class="badge" [value]="totalItems()" severity="danger" routerLink="/cart">
          <i class="pi pi-shopping-cart" routerLink="/cart"></i>
        </p-overlaybadge>
      } @else {
        <i class="pi pi-shopping-cart" routerLink="/cart"></i>
      }


    </div>
  </div>
</header>
