<div class="categories-banner">
  <h3>Categories</h3>
  <div class="categories-banner-items">
      @for(cat of categories(); track cat._id) {
      <div 
        class="category" 
        [ngStyle]="{'backgroundColor': cat.color}"
        [routerLink]="`/products/category/${cat._id}`"
      >
        <div class="category-icon" >
          <i class="pi pi-{{cat.icon}}"></i>
        </div>
        <div class="category-name">
          {{cat.name}}
        </div>
      </div>
  
    }
  </div>

</div>
