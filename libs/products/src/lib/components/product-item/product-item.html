@let prod = product();

<div class="product-item">
  <div class="product-item-wrapper">
    <img [src]="prod.image" alt="prod.name" srcset="" width="100px" class="image">
    <h4 class="name">{{prod.name}}</h4>
    <h5 class="price">{{prod.price | currency: 'EUR'}}</h5>
    <p-button 
      class="mt-3"
      label="Add to cart"
      icon="pi pi-shopping-cart"
      [rounded]="true"
    ></p-button>
  </div>
</div>
