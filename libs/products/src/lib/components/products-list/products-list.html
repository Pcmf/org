<div class="menu">
  <h3>Products list</h3>
  <div class="grid">
    <div class="col-3">
      <h4>Categories</h4>
      <lib-side-menu [paramId]="paramId()" (selectedCategoriesOut)="selectedCategories.set($event)"></lib-side-menu>
    </div>
    <div class="col-9">
      <div class="grid">
        @for(product of products(); track product.id) {
          <div class="col-3">
            <lib-product-item [product]="product"></lib-product-item>
          </div>
        }
      </div>
    </div>
  </div>
</div>
