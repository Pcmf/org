<div class="card flex justify-center">
  <div class="flex flex-col gap-4">
    @for(category of categories(); track category._id) {
      <div class="flex items-center">
          <p-checkbox
            [disabled]="!!paramId()"
            [inputId]="category._id"
            binary="true"
            [(ngModel)]="category.checked"
            (onChange)="updateSelectedCategories()"
          />
          <label [for]="category._id" class="ml-2">{{ category.name }}</label>
      </div>
    }
    @if(paramId()) {
      <p-button 
          routerLink="/products"
          class="mt-3"
          label="All categories"
          icon="pi pi-refresh"
          severity="info"
          [rounded]="true"
      ></p-button>
    }
  </div>
</div>
