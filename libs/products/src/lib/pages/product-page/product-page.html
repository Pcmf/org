@let prod = product.value();
<p-toast/>
<div class="product-page">
  <div class="grid">
    <div class="col-6">
        <!-- ui-gallery  -->
        <lib-gallery [image]="prod?.image!" [images]="prod?.images!"></lib-gallery>
    </div>

    <div class="col-6 product">
      <h2 class="product-name">{{prod?.name}}</h2>

      <p class="product-description">
        {{prod?.description}}
      </p>
      <div class="product-rating">
        <p-rating [ngModel]="prod?.rating" [disabled]="true" />
      </div>
      <div class="product-price">
        {{prod?.price | currency: 'EUR'}}
        <span class="price-before">{{ prod?.price!*(1.15) | currency: 'EUR'}}</span>
      </div>
      <div class="product-quantity">
        <label class="mb-2 block font-bold" for="quantity">Quantity</label>
        <p-inputnumber
            [(ngModel)]="quantity"
            [showButtons]="true"
            buttonLayout="horizontal"
            inputId="quantity"
            spinnerMode="horizontal"
            [step]="1" mode="decimal"
            [min]="0"
            [inputSize]="4"
        >
          <ng-template #incrementbuttonicon>
              <span class="pi pi-plus"></span>
          </ng-template>
          <ng-template #decrementbuttonicon>
              <span class="pi pi-minus"></span>
          </ng-template>
        </p-inputnumber>
      </div>
      <div class="product-actions">
        <p-button (onClick)="addToCart()" class="mt-3" label="Add to cart" icon="pi pi-shopping-cart" [rounded]="true"></p-button>
        <p-button class="mt-3" label="Buy now" icon="pi pi-check" severity="warn" [rounded]="true"></p-button>
      </div>
      <div class="product-back">
        <p-button (click)="location.back()" class="mt-6" label="Back" icon="pi pi-arrow-left" severity="secondary"></p-button>
      </div>
    </div>
  </div>
  <div class="grid">
    <div class="col-12">
      <div [innerHTML]="prod?.richDescription" class="product-rich-description"></div>
    </div>
  </div>
</div>
