<div class="login-register">
  <div class="login-register-panel">
    <div class="grid">
      <div class="col-6">
        <img src="login-photo.png" alt="login image"/>
      </div>
      <div class="col-6">
        <h3>Welcome</h3>
        <h2>Login page</h2>
        <div class="grid">
          <div class="col-12 mb-0">
            <p-inputgroup class="p-4 pb-0 mt-6">
                <p-inputgroup-addon>
                    <i class="pi pi-user"></i>
                </p-inputgroup-addon>
                <input pInputText  placeholder="Email" />
            </p-inputgroup>
          </div>
          <div class="col-12 mt-0">
            <p-inputgroup class="p-4 pt-0">
                <p-inputgroup-addon>
                    <i class="pi pi-eye-slash"></i>
                </p-inputgroup-addon>
                <input pInputText type="password"  placeholder="Password" />
            </p-inputgroup>
          </div>
          <div class="col-12 p-4 pt-0">
            <p-button label="Submit" styleClass="full-btn"/>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
